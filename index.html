<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Massive Rename</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a14;
      color: #e2e2f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Animated Background ─── */
    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
                  radial-gradient(circle at 50% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
      animation: bgShift 20s ease-in-out infinite alternate;
      z-index: -1;
    }
    @keyframes bgShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-3%, 3%) rotate(3deg); }
    }

    /* ─── Container ─── */
    .app {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ─── Header ─── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    .header p {
      font-size: 0.82rem;
      color: #6b6b8a;
      margin-top: 4px;
    }

    /* ─── Drop Zone ─── */
    .dropzone {
      position: relative;
      border: 2px dashed rgba(129, 140, 248, 0.3);
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }
    .dropzone::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.06), rgba(168, 85, 247, 0.04));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .dropzone:hover { border-color: rgba(129, 140, 248, 0.55); }
    .dropzone:hover::before { opacity: 1; }
    .dropzone.dragover {
      border-color: #818cf8;
      background: rgba(99, 102, 241, 0.08);
      transform: scale(1.01);
    }
    .dropzone.dragover::before { opacity: 1; }

    .drop-icon {
      font-size: 2.2rem;
      margin-bottom: 8px;
      display: block;
      filter: drop-shadow(0 0 12px rgba(129, 140, 248, 0.4));
      transition: transform 0.3s ease;
    }
    .dropzone:hover .drop-icon { transform: translateY(-2px); }
    .drop-text {
      font-size: 0.88rem;
      color: #9191b0;
      position: relative;
      z-index: 1;
    }
    .drop-text strong { color: #a5b4fc; }

    /* ─── File List ─── */
    .file-list-container {
      margin-top: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(0, 0, 0, 0.25);
      overflow: hidden;
      display: none;
    }
    .file-list-container.visible { display: block; }
    .file-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .file-list-header span {
      font-size: 0.73rem;
      font-weight: 600;
      color: #6ee7b7;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .btn-clear-files {
      background: none;
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #f87171;
      font-size: 0.68rem;
      padding: 2px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn-clear-files:hover { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.4); }

    .file-list {
      max-height: 140px;
      overflow-y: auto;
      padding: 6px 0;
    }
    .file-list::-webkit-scrollbar { width: 5px; }
    .file-list::-webkit-scrollbar-track { background: transparent; }
    .file-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 14px;
      font-size: 0.76rem;
      color: #a5a5c0;
      transition: background 0.15s ease;
    }
    .file-item:hover { background: rgba(255, 255, 255, 0.03); }
    .file-item-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .file-item-name::before { content: '📄 '; }
    .btn-remove-file {
      background: none;
      border: none;
      color: #6b6b8a;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0 4px;
      margin-left: 8px;
      border-radius: 4px;
      transition: all 0.2s ease;
      line-height: 1;
      flex-shrink: 0;
    }
    .btn-remove-file:hover { color: #f87171; background: rgba(239, 68, 68, 0.1); }

    /* ─── Form Fields ─── */
    .form-group {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-row > * { flex: 1; }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #e2e2f0;
      font-family: inherit;
      font-size: 0.85rem;
      transition: all 0.25s ease;
      outline: none;
    }
    .field input::placeholder { color: #5a5a7a; }
    .field input:focus {
      border-color: rgba(129, 140, 248, 0.5);
      background: rgba(129, 140, 248, 0.06);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    /* ─── Checkbox ─── */
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      cursor: pointer;
      user-select: none;
    }
    .checkbox-wrapper input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .checkbox-wrapper input[type="checkbox"]:checked {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-color: transparent;
    }
    .checkbox-wrapper input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      color: white;
      font-size: 13px;
      font-weight: 700;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .checkbox-wrapper span {
      font-size: 0.84rem;
      color: #9191b0;
    }

    /* ─── Button ─── */
    .btn-primary {
      width: 100%;
      margin-top: 16px;
      padding: 13px 20px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary span { position: relative; z-index: 1; }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* ─── Log Output ─── */
    .log-container {
      margin-top: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .log-header span {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b6b8a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .log-body {
      padding: 14px 16px;
      height: 180px;
      overflow-y: auto;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.78rem;
      line-height: 1.7;
      color: #8b8baa;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-body::-webkit-scrollbar { width: 6px; }
    .log-body::-webkit-scrollbar-track { background: transparent; }
    .log-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .btn-clear {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: #6b6b8a;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn-clear:hover { border-color: rgba(255,255,255,0.2); color: #9191b0; }

    /* ─── Animations ─── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .app > * {
      animation: fadeIn 0.5s ease both;
    }
    .app > *:nth-child(2) { animation-delay: 0.05s; }
    .app > *:nth-child(3) { animation-delay: 0.1s; }
    .app > *:nth-child(4) { animation-delay: 0.15s; }
    .app > *:nth-child(5) { animation-delay: 0.2s; }
    .app > *:nth-child(6) { animation-delay: 0.25s; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <h1>⚡ Massive Rename</h1>
      <p>Renombrador masivo de series y subtítulos</p>
    </div>

    <!-- Drop Zone -->
    <div class="dropzone" id="dropzone">
      <span class="drop-icon">📄</span>
      <div class="drop-text">
        <strong>Arrastra archivos aquí</strong><br/>
        o haz click para seleccionar archivos
      </div>
    </div>

    <!-- File List (shown after files are added) -->
    <div class="file-list-container" id="fileListContainer">
      <div class="file-list-header">
        <span id="fileCountLabel">0 archivos</span>
        <button class="btn-clear-files" id="clearFilesBtn">Quitar todos</button>
      </div>
      <div class="file-list" id="fileList"></div>
    </div>

    <!-- Form -->
    <div class="form-group">
      <div class="field">
        <input id="searchPrefix" type="text" placeholder='Prefijo de búsqueda (ej: "S01E")' />
      </div>
      <div class="input-row">
        <div class="field">
          <input id="extension" type="text" placeholder='Extensión (ej: .mkv)' />
        </div>
        <div class="field">
          <input id="finalPrefix" type="text" placeholder='Prefijo final (ej: "Serie_X_")' />
        </div>
      </div>
      <div class="input-row">
        <div class="field">
          <input id="startIdx" type="number" placeholder='Índice inicial (1)' min="0" />
        </div>
        <div class="field">
          <input id="padLength" type="number" placeholder='Dígitos (3)' min="1" max="10" />
        </div>
      </div>
      <label class="checkbox-wrapper">
        <input type="checkbox" id="dryRun" />
        <span>Modo simulación — no realiza cambios reales</span>
      </label>
    </div>

    <!-- Run Button -->
    <button class="btn-primary" id="runBtn"><span>🚀 Ejecutar renombrado</span></button>

    <!-- Log -->
    <div class="log-container">
      <div class="log-header">
        <span>Registro de salida</span>
        <button class="btn-clear" id="clearLogBtn">Limpiar</button>
      </div>
      <div class="log-body" id="log">Esperando acción...</div>
    </div>
  </div>

  <script>
    // ─── State ───
    let selectedFiles = []; // array of full file paths

    const dropzone        = document.getElementById('dropzone');
    const fileListContainer = document.getElementById('fileListContainer');
    const fileListEl      = document.getElementById('fileList');
    const fileCountLabel  = document.getElementById('fileCountLabel');
    const clearFilesBtn   = document.getElementById('clearFilesBtn');
    const logEl           = document.getElementById('log');
    const runBtn          = document.getElementById('runBtn');
    const clearLogBtn     = document.getElementById('clearLogBtn');

    // ─── Render File List ───
    function renderFileList() {
      fileListEl.innerHTML = '';
      if (selectedFiles.length === 0) {
        fileListContainer.classList.remove('visible');
        return;
      }
      fileListContainer.classList.add('visible');
      fileCountLabel.textContent = `${selectedFiles.length} archivo(s)`;

      selectedFiles.forEach((filePath, idx) => {
        const row = document.createElement('div');
        row.className = 'file-item';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'file-item-name';
        // Show only basename
        const parts = filePath.replace(/\\/g, '/').split('/');
        nameSpan.textContent = parts[parts.length - 1];
        nameSpan.title = filePath; // full path on hover

        const removeBtn = document.createElement('button');
        removeBtn.className = 'btn-remove-file';
        removeBtn.textContent = '✕';
        removeBtn.title = 'Quitar este archivo';
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          selectedFiles.splice(idx, 1);
          renderFileList();
        });

        row.appendChild(nameSpan);
        row.appendChild(removeBtn);
        fileListEl.appendChild(row);
      });
    }

    // ─── Add files (deduplicates) ───
    function addFiles(paths) {
      for (const p of paths) {
        if (!selectedFiles.includes(p)) {
          selectedFiles.push(p);
        }
      }
      renderFileList();
    }

    // ─── Drop zone: drag events ───
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.remove('dragover');
    });

    // Handle dropped FILES
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.remove('dragover');

      const files = Array.from(e.dataTransfer.files);
      if (files.length === 0) return;

      // Only accept files, skip directories (type === '' and no extension could be dir)
      const filePaths = files
        .filter(f => f.size > 0 || f.name.includes('.')) // best-effort filter: dirs usually have size 0 and no ext
        .map(f => f.path);

      if (filePaths.length > 0) {
        addFiles(filePaths);
      }
    });

    // Click to open native FILE picker
    dropzone.addEventListener('click', async () => {
      const result = await window.api.openFileDialog();
      if (!result.canceled && result.filePaths.length > 0) {
        addFiles(result.filePaths);
      }
    });

    // Clear all files
    clearFilesBtn.addEventListener('click', () => {
      selectedFiles = [];
      renderFileList();
    });

    // ─── Run ───
    runBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) {
        logEl.textContent = '❌ Primero arrastra o selecciona archivos.';
        return;
      }

      const opts = {
        files:        selectedFiles,
        searchPrefix: document.getElementById('searchPrefix').value.trim(),
        extension:    document.getElementById('extension').value.trim(),
        finalPrefix:  document.getElementById('finalPrefix').value.trim(),
        startIndex:   parseInt(document.getElementById('startIdx').value) || 1,
        padLength:    parseInt(document.getElementById('padLength').value) || 3,
        dryRun:       document.getElementById('dryRun').checked,
      };

      runBtn.disabled = true;
      logEl.textContent = '🔄 Ejecutando...\n';

      try {
        const result = await window.api.runRename(opts);
        if (result.logs && result.logs.length > 0) {
          logEl.textContent = result.logs.join('\n');
        } else if (!result.success) {
          logEl.textContent += `\n❌ Error: ${result.error}`;
        }
      } catch (err) {
        logEl.textContent += `\n❌ Error inesperado: ${err.message}`;
      }

      runBtn.disabled = false;
      logEl.scrollTop = logEl.scrollHeight;
    });

    // ─── Clear log ───
    clearLogBtn.addEventListener('click', () => {
      logEl.textContent = 'Esperando acción...';
    });
  </script>
</body>
</html>
