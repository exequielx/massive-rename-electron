<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Massive Rename</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    /* ─── Modern Theme & Reset ─── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background-color: #121214;
      color: #e3e3e6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.5;
    }


    /* ─── Main Layout ─── */
    .container {
      max-width: 740px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-grow: 1;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222226;
      padding-bottom: 16px;
    }

    .header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 span {
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      font-size: 0.8rem;
      color: #8c8c99;
    }

    /* ─── Drop Zone ─── */
    .dropzone {
      border: 1.5px dashed #2d2d34;
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      background: #18181c;
      transition: border-color 0.2s ease, background-color 0.2s ease;
      position: relative;
    }

    .dropzone:hover {
      border-color: #00f2fe;
      background: #1c1c22;
    }

    .dropzone.dragover {
      border-color: #00f2fe;
      background: rgba(0, 242, 254, 0.05);
    }

    /* Critical fix: Ignore pointer events on child nodes to prevent flickering and drag-and-drop bugs */
    .dropzone * {
      pointer-events: none;
    }

    .drop-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      display: block;
    }

    .drop-text {
      font-size: 0.88rem;
      color: #a0a0ab;
    }

    .drop-text strong {
      color: #00f2fe;
      font-weight: 600;
    }

    /* ─── Form & Config Section ─── */
    .config-card {
      background: #18181c;
      border: 1px solid #222226;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .config-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8c8c99;
      border-bottom: 1px solid #222226;
      padding-bottom: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-grid.triple {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #a0a0ab;
    }

    .form-group input {
      background: #121214;
      border: 1px solid #2d2d34;
      border-radius: 8px;
      padding: 10px 12px;
      color: #ffffff;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-group input:focus {
      border-color: #00f2fe;
      box-shadow: 0 0 0 2px rgba(0, 242, 254, 0.1);
    }

    .form-group input::placeholder {
      color: #52525b;
    }

    /* ─── Switch / Checkbox ─── */
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      margin-top: 4px;
    }

    .checkbox-container input {
      display: none;
    }

    .custom-checkbox {
      width: 18px;
      height: 18px;
      border: 1px solid #2d2d34;
      border-radius: 4px;
      background: #121214;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .checkbox-container input:checked+.custom-checkbox {
      background: #00f2fe;
      border-color: #00f2fe;
    }

    .checkbox-container input:checked+.custom-checkbox::after {
      content: '✓';
      color: #121214;
      font-size: 11px;
      font-weight: 700;
    }

    .checkbox-label {
      font-size: 0.8rem;
      color: #a0a0ab;
      font-weight: 500;
    }

    /* ─── File Preview Section ─── */
    .preview-card {
      background: #18181c;
      border: 1px solid #222226;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      max-height: 300px;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #222226;
    }

    .preview-header span {
      font-size: 0.82rem;
      font-weight: 700;
      color: #8c8c99;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid #ef444455;
      color: #f87171;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .clear-btn:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444aa;
    }

    .preview-table-container {
      overflow-y: auto;
      flex-grow: 1;
    }

    .preview-table-container::-webkit-scrollbar {
      width: 6px;
    }

    .preview-table-container::-webkit-scrollbar-thumb {
      background: #2d2d34;
      border-radius: 3px;
    }

    .preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      text-align: left;
    }

    .preview-table th {
      background: #151518;
      color: #71717a;
      font-weight: 600;
      padding: 8px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #222226;
    }

    .preview-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #1c1c20;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 250px;
    }

    .preview-table tr:hover td {
      background: rgba(255, 255, 255, 0.015);
    }

    .col-original {
      color: #a0a0ab;
    }

    .col-arrow {
      width: 24px;
      text-align: center;
      color: #52525b;
    }

    .col-new {
      color: #00f2fe;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
    }

    .col-new.no-match {
      color: #52525b;
      font-style: italic;
    }

    .col-action {
      width: 40px;
      text-align: center;
    }

    .remove-file-btn {
      background: transparent;
      border: none;
      color: #52525b;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 2px;
      border-radius: 4px;
      transition: all 0.2s ease;
      line-height: 1;
    }

    .remove-file-btn:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.15);
    }

    /* ─── Actions & Run ─── */
    .btn-run {
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      color: #0a0a0c;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-run:hover {
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.35);
    }

    .btn-run:active {
      transform: scale(0.99);
    }

    .btn-run:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* ─── Logs Output ─── */
    .log-card {
      background: #18181c;
      border: 1px solid #222226;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      min-height: 150px;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid #222226;
      background: #151518;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    .log-header span {
      font-size: 0.75rem;
      font-weight: 700;
      color: #8c8c99;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .log-clear {
      background: transparent;
      border: none;
      color: #52525b;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s ease;
      font-family: inherit;
    }

    .log-clear:hover {
      color: #e3e3e6;
    }

    .log-body {
      padding: 12px 16px;
      flex-grow: 1;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #a0a0ab;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-body::-webkit-scrollbar {
      width: 6px;
    }

    .log-body::-webkit-scrollbar-thumb {
      background: #2d2d34;
      border-radius: 3px;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div>
        <h1><span>Massive Rename</span></h1>
        <p>Herramienta avanzada de renombrado para series y subtítulos</p>
      </div>
    </div>

    <!-- Drop Zone -->
    <div class="dropzone" id="dropzone">
      <span class="drop-icon">📄</span>
      <div class="drop-text">
        <strong>Arrastra archivos aquí</strong> o haz click para seleccionarlos
      </div>
    </div>

    <!-- Live Preview Table (Visible only when files are loaded) -->
    <div class="preview-card" id="previewCard" style="display: none;">
      <div class="preview-header">
        <span id="fileCountText">0 archivos cargados</span>
        <button class="clear-btn" id="clearFilesBtn">Quitar todos</button>
      </div>
      <div class="preview-table-container">
        <table class="preview-table">
          <thead>
            <tr>
              <th>Nombre Original</th>
              <th class="col-arrow"></th>
              <th>Vista Previa</th>
              <th class="col-action"></th>
            </tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Config Parameters -->
    <div class="config-card">
      <div class="config-title">Configuración de renombrado</div>

      <div class="form-group">
        <label for="prefix">Prefijo del nuevo nombre</label>
        <input id="prefix" type="text" placeholder="Ej: Beacon 23 S01E o Capitulo_" />
      </div>

      <label class="checkbox-container" style="margin-top: 12px;">
        <input type="checkbox" id="dryRun" checked />
        <div class="custom-checkbox"></div>
        <span class="checkbox-label">Modo simulación (verificar nombres sin modificar archivos)</span>
      </label>
    </div>

    <!-- Run Button -->
    <button class="btn-run" id="runBtn" disabled>
      <span>🚀 Iniciar proceso de renombrado</span>
    </button>

    <!-- Logs Output -->
    <div class="log-card">
      <div class="log-header">
        <span>Registro de actividad</span>
        <button class="log-clear" id="clearLogBtn">Limpiar registro</button>
      </div>
      <div class="log-body" id="log">Arrastra archivos para comenzar...</div>
    </div>
  </div>

  <script>
    // ─── State ───
    let selectedFiles = []; // Array of absolute file paths

    const dropzone = document.getElementById('dropzone');
    const previewCard = document.getElementById('previewCard');
    const previewBody = document.getElementById('previewBody');
    const fileCountText = document.getElementById('fileCountText');
    const clearFilesBtn = document.getElementById('clearFilesBtn');

    const prefixInput = document.getElementById('prefix');
    const dryRunCheckbox = document.getElementById('dryRun');

    const runBtn = document.getElementById('runBtn');
    const logEl = document.getElementById('log');
    const clearLogBtn = document.getElementById('clearLogBtn');

    // ─── Helper: Get File Extension & Basename ───
    function getFileParts(filePath) {
      const parts = filePath.replace(/\\/g, '/').split('/');
      const filename = parts[parts.length - 1];
      const lastDot = filename.lastIndexOf('.');
      if (lastDot === -1) {
        return { name: filename, ext: '' };
      }
      return {
        name: filename.substring(0, lastDot),
        ext: filename.substring(lastDot)
      };
    }

    // ─── Generate Live Preview List ───
    function updateLivePreview() {
      previewBody.innerHTML = '';
      if (selectedFiles.length === 0) {
        previewCard.style.display = 'none';
        runBtn.disabled = true;
        return;
      }

      previewCard.style.display = 'flex';
      runBtn.disabled = false;

      const prefix = prefixInput.value; // Get custom prefix

      // Sort files alphabetically to ensure correct sequence numbering
      const sortedFiles = [...selectedFiles].sort((a, b) => a.localeCompare(b));

      sortedFiles.forEach((filePath, idx) => {
        const parts = getFileParts(filePath);
        const originalName = parts.name + parts.ext;

        const row = document.createElement('tr');

        // Column 1: Original Name
        const tdOrig = document.createElement('td');
        tdOrig.className = 'col-original';
        tdOrig.textContent = originalName;
        tdOrig.title = filePath;

        // Column 2: Arrow Indicator
        const tdArrow = document.createElement('td');
        tdArrow.className = 'col-arrow';
        tdArrow.innerHTML = '➔';

        // Column 3: New Name Preview
        const tdNew = document.createElement('td');
        tdNew.className = 'col-new';

        // Calculate preview index (starts at 1, padded to 2 digits by default)
        const indexNum = 1 + idx;
        const paddedEpisode = String(indexNum).padStart(2, '0');
        const newName = `${prefix}${paddedEpisode}${parts.ext}`;

        tdNew.textContent = newName;

        // Column 4: Remove Button
        const tdAction = document.createElement('td');
        tdAction.className = 'col-action';
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-file-btn';
        removeBtn.innerHTML = '✕';
        removeBtn.title = 'Quitar de la lista';
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          selectedFiles = selectedFiles.filter(item => item !== filePath);
          updateLivePreview();
        });
        tdAction.appendChild(removeBtn);

        row.appendChild(tdOrig);
        row.appendChild(tdArrow);
        row.appendChild(tdNew);
        row.appendChild(tdAction);
        previewBody.appendChild(row);
      });

      fileCountText.textContent = `${selectedFiles.length} archivo(s) cargados`;
    }

    // ─── Add File Paths & Validate ───
    async function handleFileSelection(paths) {
      if (!paths || paths.length === 0) return;

      // Use IPC to filter out folders using Node on the backend
      const validFiles = await window.api.validateFiles(paths);

      // Deduplicate and append
      validFiles.forEach(f => {
        if (!selectedFiles.includes(f)) {
          selectedFiles.push(f);
        }
      });

      updateLivePreview();
    }

    // ─── Unified Global Drag & Drop Event Listeners ───
    let dragCounter = 0;

    window.addEventListener('dragenter', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dragCounter++;
      dropzone.classList.add('dragover');
    }, false);

    window.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.stopPropagation();
    }, false);

    window.addEventListener('dragleave', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        dropzone.classList.remove('dragover');
      }
    }, false);

    window.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dragCounter = 0;
      dropzone.classList.remove('dragover');

      if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        const paths = Array.from(e.dataTransfer.files)
          .map(f => window.api.getPathForFile(f))
          .filter(Boolean);
        handleFileSelection(paths);
      }
    }, false);

    // Dropzone click opens native file selection dialog
    dropzone.addEventListener('click', async () => {
      const result = await window.api.openFileDialog();
      if (!result.canceled && result.filePaths.length > 0) {
        handleFileSelection(result.filePaths);
      }
    });

    // Clear all files
    clearFilesBtn.addEventListener('click', () => {
      selectedFiles = [];
      updateLivePreview();
    });

    // Real-time preview updates when configuration changes
    prefixInput.addEventListener('input', updateLivePreview);

    // ─── Run Rename ───
    runBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) {
        logEl.textContent = '❌ Por favor, carga algunos archivos primero.';
        return;
      }

      const opts = {
        files: selectedFiles,
        finalPrefix: prefixInput.value,
        startIndex: 1,
        padLength: 2,
        dryRun: dryRunCheckbox.checked,
      };

      runBtn.disabled = true;
      logEl.textContent = '🔄 Iniciando renombrado...\n';

      try {
        const result = await window.api.runRename(opts);
        if (result.logs && result.logs.length > 0) {
          logEl.textContent = result.logs.join('\n');
          // If changes were made successfully (not dryRun), clear the renamed files
          if (result.success && !opts.dryRun) {
            selectedFiles = [];
            updateLivePreview();
          }
        } else if (!result.success) {
          logEl.textContent += `\n❌ Error: ${result.error}`;
        }
      } catch (err) {
        logEl.textContent += `\n❌ Error de ejecución: ${err.message}`;
      }

      runBtn.disabled = false;
      logEl.scrollTop = logEl.scrollHeight;
    });

    // Clear log
    clearLogBtn.addEventListener('click', () => {
      logEl.textContent = 'Registro limpio.';
    });
  </script>
</body>

</html>
